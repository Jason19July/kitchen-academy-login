<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | The Kitchen Academy</title>
    <script data-memberstack-app="app_cmlt23jfd002u0stjhljd13s9" src="https://static.memberstack.com/scripts/v2/memberstack.js" type="text/javascript"></script>
    <style>
        body { background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; margin: 0; padding: 20px; }
        .hub-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 100%; }
        .logo { color: #800000; font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        .input-field { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: #800000; color: white; width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    </style>
</head>
<body>
    <div class="hub-card">
        <div class="logo">Reset Password</div>
        <p style="color: #666; margin-bottom: 20px;">Enter the 6-digit code sent to your email and your new password.</p>
        
        <!-- This form has the exact data attributes Memberstack needs -->
        <form data-ms-form="reset-password">
            <input type="text" data-ms-member="token" class="input-field" placeholder="6-Digit Code" required>
            <input type="password" data-ms-member="password" class="input-field" placeholder="New Password" required>
            <button type="submit" class="btn-primary">Confirm & Reset</button>
        </form>
    </div>
</body>
</html>
